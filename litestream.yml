# Litestream config — continuous replication of SQLite to Hetzner Storage Box.
# Credentials come from the environment (see docker-compose.yml).

dbs:
  - path: /data/app.db
    replicas:
      - type: s3
        endpoint: https://${STORAGE_BOX_ENDPOINT:-fsn1.your-objectstorage.com}
        bucket: ${STORAGE_BOX_BUCKET:-onehouse-backup}
        path: app.db
        retention: 720h           # 30 days
        snapshot-interval: 24h
        sync-interval: 10s
