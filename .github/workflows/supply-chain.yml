name: Supply chain

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit + lockfile integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: pnpm

      - name: Frozen-lockfile install
        run: pnpm install --frozen-lockfile

      - name: Audit known vulnerabilities (fail on moderate+)
        run: pnpm audit --audit-level=moderate

      - name: Reject exotic or non-registry resolutions in the lockfile
        run: |
          set -euo pipefail
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::error::pnpm-lock.yaml missing — every commit must include it"
            exit 1
          fi
          if grep -nE '^\s*resolution:\s*\{\s*(tarball|repo|directory):' pnpm-lock.yaml; then
            echo "::error::Lockfile contains exotic resolutions (tarball/repo/directory)"
            exit 1
          fi
          if grep -nE '^\s*registry:\s*' pnpm-lock.yaml | grep -vE 'registry\.npmjs\.org'; then
            echo "::error::Lockfile references a non-npmjs registry"
            exit 1
          fi

      - name: Dependency review (PR only — fails on new vulnerable / disallowed-license deps)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0, Unlicense

  license:
    name: License check (ELv2 distribution gate)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: pnpm

      - name: Frozen-lockfile install
        run: pnpm install --frozen-lockfile

      - name: Verify production deps are MIT/Apache/BSD/ISC/0BSD/CC0
        run: pnpm license:check
