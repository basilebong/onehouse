name: Supply chain

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Supply-chain audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Audit known vulnerabilities (fail on moderate+)
        run: pnpm audit --audit-level=moderate

      - name: Dependency review (PR only — fails on new vulnerable or disallowed-license deps)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # MPL-2.0: lightningcss (Tailwind v4 CSS pipeline, stack-locked). Use unmodified at build time;
          #   MPL §3.3 explicitly allows combining unmodified MPL files into a Larger Work under any license.
          # CC-BY-4.0: caniuse-lite (browser-support dataset pulled by Babel→browserslist). Build-time data only,
          #   does not ship in production bundle; attribution preserved via the package's LICENSE file.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0, Unlicense, MPL-2.0, CC-BY-4.0
          # rou3 (Hono router): package.json declares "license": "MIT" and ships an MIT LICENSE file;
          #   GitHub's scanner spuriously reports "MIT AND MS-PL" — verified false-positive against upstream source.
          # @better-fetch/fetch (better-auth HTTP client): package.json missing license field, but the published
          #   tarball ships an MIT LICENSE (copyright Bereket Engida). Verified in node_modules @ 1.1.21.
          allow-dependencies-licenses: 'pkg:npm/rou3, pkg:npm/%40better-fetch/fetch'
