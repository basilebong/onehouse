name: setup
description: Checkout + pnpm + Node + Bun + workspace install (cached pnpm store)

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: latest

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - shell: bash
      run: pnpm install --frozen-lockfile
